kind = "mobile"
previewPath = "/"
title = "Dot365 - Year in Dots"
version = "1.0.0"
id = "artifacts/dot365"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 26235

[services.development]
run = "pnpm --filter @workspace/dot365 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dot365", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dot365", "run", "serve" ]

[services.env]
PORT = "26235"
BASE_PATH = "/"
